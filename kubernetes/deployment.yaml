apiVersion: apps/v1
kind: Deployment
metadata:
  name: domaingpt-api
  labels:
    app: domaingpt-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: domaingpt-api
  template:
    metadata:
      labels:
        app: domaingpt-api
    spec:
      containers:
        - name: api
          image: domaingpt/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: domaingpt-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: domaingpt-api
spec:
  selector:
    app: domaingpt-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: domaingpt-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: domaingpt-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
